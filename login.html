<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Entrar | Curadoria Elite Travel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  background:
  linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
  url("images/recepcao-hotel.jpeg") center/cover no-repeat fixed;
  color:#fff;
  min-height:100vh;
  box-sizing:border-box;
}

/* barra superior */

header{
  width:100%;
  padding:14px 28px;
  box-sizing:border-box;
  background:rgba(30,30,30,0.42);
  border-bottom:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand img{
  width:34px;
  height:34px;
  object-fit:contain;
}

.brand-text{
  display:flex;
  flex-direction:column;
}

.brand-name{
  color:#d4af37;
  font-size:18px;
  font-weight:700;
  letter-spacing:0.4px;
  text-transform:uppercase;
}

.brand-sub{
  color:rgba(255,255,255,0.78);
  font-size:12px;
  margin-top:2px;
}

/* centralização da tela */

main{
  min-height:calc(100vh - 63px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 18px;
  box-sizing:border-box;
}

/* card login */

.card{
  width:100%;
  max-width:520px;
  background:linear-gradient(145deg,rgba(16,19,23,0.92),rgba(11,11,11,0.92));
  border:1px solid rgba(255,255,255,0.10);
  border-radius:16px;
  padding:28px;
  box-sizing:border-box;
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  box-shadow:0 25px 60px rgba(0,0,0,0.55);
}

h1{
  margin:0 0 6px;
  font-size:22px;
}

.sub{
  margin:0 0 18px;
  color:rgba(255,255,255,0.72);
  font-size:14px;
}

label{
  display:block;
  margin:14px 0 6px;
  font-size:13px;
  color:rgba(255,255,255,0.72);
}

input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background:#eaf2ff;
  color:#000;
  box-sizing:border-box;
  outline:none;
}

.password-wrap{
  position:relative;
}

.toggle-eye{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:transparent;
  cursor:pointer;
  padding:8px 10px;
  border-radius:10px;
  font-weight:700;
  color:rgba(0,0,0,0.70);
  font-size:12.5px;
}

.remember-row{
  margin-top:12px;
  display:flex;
  align-items:center;
  gap:10px;
  color:rgba(255,255,255,0.78);
  font-size:13px;
}

.remember-row input{
  width:auto;
  accent-color:#d4af37;
}

.btn{
  margin-top:16px;
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#ffffff;
  color:#000;
  font-weight:800;
  cursor:pointer;
}

.btn:disabled{
  opacity:0.65;
  cursor:not-allowed;
}

.row{
  margin-top:14px;
  font-size:13px;
}

a{
  color:#d4af37;
  text-decoration:none;
  font-weight:700;
}

.error{
  margin-top:12px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(212,175,55,0.10);
  display:none;
}

.ok{
  margin-top:12px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);
  background:rgba(255,255,255,0.06);
  display:none;
}

</style>
</head>

<body>

<header>
<div class="brand">
<img src="images/rosa-dos-ventos.png">
<div class="brand-text">
<div class="brand-name">Curadoria Elite Travel</div>
<div class="brand-sub">O seu mundo, bem indicado.</div>
</div>
</div>
</header>

<main>

<div class="card">

<h1>Entrar</h1>
<p class="sub">Acesse sua conta para visualizar seus materiais.</p>

<form id="loginForm">

<label>E-mail</label>
<input id="email" type="email" required />

<label>Senha</label>

<div class="password-wrap">
<input id="password" type="password" required />
<button type="button" id="toggleEye" class="toggle-eye">Mostrar</button>
</div>

<div class="remember-row">
<input type="checkbox" id="rememberEmail">
<label for="rememberEmail">Lembrar meu e-mail</label>
</div>

<button class="btn" id="btnLogin">Entrar</button>

<div class="error" id="errorBox"></div>
<div class="ok" id="okBox"></div>

<div class="row">
Não tem conta? <a href="register.html">Criar cadastro</a>
</div>

</form>

</div>

</main>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL="https://lnyoqoezezisakghtmim.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxueW9xb2V6ZXppc2FrZ2h0bWltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQxNjI4OTMsImV4cCI6MjA3OTczODg5M30.Nn9ZPRXeJlvCGJ2kXQ3XBvT743pQn2VIXEsT9pexqnA";

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const params=new URLSearchParams(window.location.search);
const returnTo=params.get("return_to")||"account.html";

const emailEl=document.getElementById("email");
const passEl=document.getElementById("password");
const toggleEye=document.getElementById("toggleEye");

const form=document.getElementById("loginForm");
const btn=document.getElementById("btnLogin");
const errorBox=document.getElementById("errorBox");
const okBox=document.getElementById("okBox");

toggleEye.addEventListener("click",()=>{
const hidden=passEl.type==="password";
passEl.type=hidden?"text":"password";
toggleEye.innerText=hidden?"Ocultar":"Mostrar";
});

form.addEventListener("submit",async(e)=>{

e.preventDefault();

const email=emailEl.value.trim();
const password=passEl.value;

if(!email||!password){
errorBox.innerText="Preencha e-mail e senha.";
errorBox.style.display="block";
return;
}

btn.disabled=true;
btn.innerText="Entrando...";

const {data,error}=await sb.auth.signInWithPassword({email,password});

if(error){
errorBox.innerText="E-mail ou senha incorretos.";
errorBox.style.display="block";
btn.disabled=false;
btn.innerText="Entrar";
return;
}

okBox.innerText="Acesso confirmado. Redirecionando...";
okBox.style.display="block";

setTimeout(()=>{
window.location.href=returnTo;
},350);

});

</script>

</body>
</html>
