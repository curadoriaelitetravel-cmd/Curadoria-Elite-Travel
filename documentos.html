
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Documentos</title>
<style>
body {background:#0b0b0b;color:#fff;font-family:Arial;}
.container{max-width:1000px;margin:50px auto;}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;}
.chip{padding:8px 14px;border:1px solid #c9a646;border-radius:20px;color:#c9a646;background:transparent;cursor:pointer;}
button{margin-top:20px;padding:10px 18px;border-radius:20px;border:1px solid #c9a646;background:transparent;color:#c9a646;cursor:pointer;}
</style>
</head>
<body>

<div class="container">
<h2>Consulta inicial por destino</h2>

<div id="chips" class="chips"></div>

<button id="verMais">Ver mais 10 destinos</button>
<button id="verMenos" style="display:none;">Ver menos</button>

<p id="contador"></p>
</div>

<script>
const DESTINOS = [
"Amsterdam","Ankara","Atenas","Atlanta","Bangkok","Barcelona","Berlim","Bogotá","Boston","Braga",
"Buenos Aires","Cancún","Chicago","Dubai","Lisboa","Londres","Los Angeles","Madrid","Miami","Montevidéu",
"New York","Orlando","Paris","Roma","Santiago","Tóquio","Toronto","Washington","Zurique"
];

DESTINOS.sort((a,b)=>a.localeCompare(b));

let quantidade = 10;

function render(){
    const container = document.getElementById("chips");
    container.innerHTML = "";

    DESTINOS.slice(0, quantidade).forEach(nome=>{
        const el = document.createElement("div");
        el.className="chip";
        el.innerText = nome;
        container.appendChild(el);
    });

    document.getElementById("contador").innerText =
        `Mostrando ${Math.min(quantidade, DESTINOS.length)} de ${DESTINOS.length} destinos`;

    document.getElementById("verMenos").style.display = quantidade > 10 ? "inline-block" : "none";
}

document.getElementById("verMais").onclick = ()=>{
    quantidade += 10;
    render();
}

document.getElementById("verMenos").onclick = ()=>{
    quantidade = 10;
    render();
}

render();
</script>

</body>
</html>
