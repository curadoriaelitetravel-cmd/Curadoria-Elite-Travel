name: Documentos Monitoring

on:
  push:
    paths:
      - 'documentos.html'
      - 'data/documentos-status.json'
      - 'scripts/check-documentos.js'
      - 'package.json'

jobs:
  monitor-documentos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run documentos monitoring
        run: npm run check-documentos
