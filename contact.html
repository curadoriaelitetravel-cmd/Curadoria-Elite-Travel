<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contato e Avaliação | Curadoria Elite Travel</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#05070b;
color:white;
}

header{
width:100%;
padding:20px 40px;
border-bottom:1px solid rgba(255,255,255,0.1);
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:700;
letter-spacing:1px;
color:#d4af37;
}

.container{
max-width:1400px;
margin:auto;
padding:60px 40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:60px;
}

.card{
background:linear-gradient(180deg,#0c1526,#09101d);
border:1px solid rgba(255,255,255,0.1);
border-radius:16px;
padding:40px;
}

h2{
margin-top:0;
}

.email{
margin-top:20px;
font-size:18px;
color:#d4af37;
text-decoration:none;
}

.stars{
margin:20px 0;
font-size:32px;
cursor:pointer;
}

.star{
opacity:0.3;
}

.star.active{
opacity:1;
}

.topics{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.topic{
padding:8px 14px;
border:1px solid rgba(255,255,255,0.2);
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.topic.active{
background:#d4af37;
color:black;
border:none;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:#0b1323;
color:white;
padding:10px;
resize:none;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#d4af37;
color:black;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

</style>
</head>


<body>

<header>

<div class="logo">
CURADORIA ELITE TRAVEL
</div>

<div>
<a href="index.html" style="color:white;text-decoration:none;">Voltar ao site</a>
</div>

</header>


<div class="container">

<!-- CONTATO -->

<div class="card">

<h2>Contato</h2>

<p>
Se desejar falar diretamente conosco, envie um email.
Responderemos o mais breve possível.
</p>

<a class="email" href="mailto:curadoriaelitetravel@gmail.com">
curadoriaelitetravel@gmail.com
</a>

</div>


<!-- AVALIAÇÃO -->

<div class="card">

<h2>Avaliação da Curadoria</h2>

<div class="stars">

<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>

</div>

<div class="topics">

<div class="topic">Sugestão</div>
<div class="topic">Dúvida</div>
<div class="topic">Correção</div>
<div class="topic">Parceria</div>
<div class="topic">Outro</div>

</div>

<textarea id="message" placeholder="Conte-nos mais sobre sua experiência..."></textarea>

<button onclick="sendFeedback()">Enviar avaliação</button>

</div>

</div>


<script>

let rating = 0
let topic = ""

const stars = document.querySelectorAll(".star")

stars.forEach(star=>{
star.addEventListener("click",()=>{

rating = star.dataset.value

stars.forEach(s=>s.classList.remove("active"))

for(let i=0;i<rating;i++){
stars[i].classList.add("active")
}

})
})

const topics = document.querySelectorAll(".topic")

topics.forEach(t=>{
t.addEventListener("click",()=>{

topics.forEach(x=>x.classList.remove("active"))

t.classList.add("active")

topic = t.innerText

})
})

function sendFeedback(){

const message = document.getElementById("message").value

const subject = "Avaliação Curadoria Elite Travel"

const body =
"Nota: " + rating + " estrelas\n\n" +
"Tópico: " + topic + "\n\n" +
"Mensagem:\n" + message

window.location.href =
"mailto:curadoriaelitetravel@gmail.com" +
"?subject=" + encodeURIComponent(subject) +
"&body=" + encodeURIComponent(body)

}

</script>

</body>
</html>
